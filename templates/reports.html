<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - EndoPredict AI</title>

    <link rel="stylesheet" href="/static/global.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            background: #f1f5f9;
            color: #0f172a;
        }

        /* SIDEBAR */

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 230px;
            height: 100vh;
            background: white;
            padding: 25px 18px;
            border-right: 1px solid #e2e8f0;
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.05);
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            color: #2563eb;
            text-align: center;
            margin-bottom: 35px;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar ul li {
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 12px;
            background: #f8fafc;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #e2e8f0;
            font-size: 15px;
            font-weight: 500;
        }

        .sidebar ul li:hover {
            background: #2563eb;
            color: white;
        }

        /* MAIN */

        .container {
            margin-left: 250px;
            padding: 35px;
        }

        .main-title {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #0f172a;
        }

        .sub-title {
            color: #64748b;
            font-size: 18px;
            margin-bottom: 35px;
        }

        /* REPORTS TABLE */

        .reports-container {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #f8fafc;
            border-bottom: 2px solid #e2e8f0;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #334155;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #e2e8f0;
        }

        tr:hover {
            background: #f8fafc;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-high {
            background: #fee2e2;
            color: #991b1b;
        }

        .status-moderate {
            background: #fef3c7;
            color: #92400e;
        }

        .status-low {
            background: #dcfce7;
            color: #166534;
        }

        .action-btn {
            padding: 8px 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.3s;
        }

        .action-btn:hover {
            background: #1d4ed8;
        }

        .download-btn {
            margin-bottom: 20px;
            padding: 12px 20px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
        }

        .download-btn:hover {
            background: #1d4ed8;
        }

        @media(max-width: 900px) {
            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
            }

            .container {
                margin-left: 0;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 10px;
            }
        }
        /* DARK MODE */

.dark-mode{
    background:#0f172a;
    color:white;
}

.dark-mode .sidebar{
    background:#1e293b;
    border-right:1px solid #334155;
}

.dark-mode .container{
    background:#0f172a;
}

.dark-mode .reports-container{
    background:#1e293b;
    color:white;
}

.dark-mode table{
    color:white;
}

.dark-mode thead{
    background:#334155;
}

.dark-mode th,
.dark-mode td{
    color:white;
    border-bottom:1px solid #475569;
}

.dark-mode tr:hover{
    background:#334155;
}

.dark-mode .main-title{
    color:white;
}

.dark-mode .sub-title{
    color:#cbd5e1;
}

.dark-mode .sidebar ul li{
    background:#334155;
    color:white;
}
    </style>
</head>

<body>

    <!-- SIDEBAR -->

    <div class="sidebar">
        <div class="logo" data-i18n="endopredict">
            EndoPredict AI
        </div>

        <ul>
            <li onclick="window.location.href='/dashboard'" data-i18n="dashboard">
                🏠 Dashboard
            </li>

            <li onclick="window.location.href='/'" data-i18n="prediction">
                🩺 Prediction
            </li>

            <li onclick="window.location.href='/analytics'" data-i18n="analytics">
                📊 Analytics
            </li>

            <li onclick="window.location.href='/reports'" data-i18n="reports">
                📁 Reports
            </li>

            <li onclick="window.location.href='/settings'" data-i18n="settings">
                ⚙ Settings
            </li>
        </ul>
    </div>

    <!-- MAIN -->

    <div class="container">
        <h1 class="main-title" data-i18n="reports">
            📁 Reports
        </h1>

        <p class="sub-title" data-i18n="patient_predictions">
            Patient predictions and diagnostic reports
        </p>

        <button class="download-btn" onclick="downloadAllReports()">
            📥 Download All Reports
        </button>

        <!-- REPORTS TABLE -->

        <div class="reports-container">
            <table>
                <thead>
                    <tr>
                        <th>Report ID</th>
                        <th>Prediction</th>
                        <th>Confidence</th>
                        <th>Risk Level</th>
                        <th>Date</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="reportsTableBody">
                    <tr>
                        <td colspan="6" style="text-align: center; color: #999;">No reports available. Make a prediction to generate reports.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function loadReports() {
            const predictionData = JSON.parse(localStorage.getItem('predictionData'));
            const tableBody = document.getElementById('reportsTableBody');
            
            if (predictionData) {
                tableBody.innerHTML = `
                    <tr>
                        <td>#REP001</td>
                        <td>${predictionData.prediction_label || 'N/A'}</td>
                        <td>${predictionData.probability || 0}%</td>
                        <td><span class="status-badge status-${predictionData.risk_level?.toLowerCase() || 'low'}">${predictionData.risk_level || 'Unknown'}</span></td>
                        <td>${predictionData.timestamp || new Date().toLocaleDateString()}</td>
                        <td><span class="status-badge" style="background: #dbeafe; color: #1e40af;">✓ Completed</span></td>
                    </tr>
                `;
            }
        }

        function downloadAllReports() {
            alert('Report downloaded successfully!');
        }

        loadReports();
    </script>

    <script src="/static/global.js"></script>

<script>

window.addEventListener("DOMContentLoaded", () => {

    initializeGlobalSettings();

    // Apply Dark Mode
    if(localStorage.getItem("darkMode") === "true"){
        document.body.classList.add("dark-mode");
    }

    // Apply Language
    const language =
        localStorage.getItem("preferredLanguage") || "en";

    translatePage(language);

    // Load Reports
    loadReports();

});

</script>

</body>

</html>
