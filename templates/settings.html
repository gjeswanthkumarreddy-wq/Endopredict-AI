<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Settings - EndoPredict AI</title>

<link rel="stylesheet" href="/static/global.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    background:#f1f5f9;
    transition:0.3s;
}

.container{
    display:flex;
    min-height:100vh;
}

/* SIDEBAR */

.sidebar{
    width:250px;
    background:white;
    color:#334155;
    padding:25px;
    position:fixed;
    height:100vh;
    border-right:1px solid #e2e8f0;
}

.logo{
    font-size:24px;
    font-weight:bold;
    margin-bottom:35px;
    color:#2563eb;
    line-height:1.3;
}

.sidebar ul{
    list-style:none;
}

.sidebar ul li{
    padding:14px 16px;
    margin-bottom:12px;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
    color:#334155;
}

.sidebar ul li:hover{
    background:#f1f5f9;
}

.active{
    background:#e2e8f0;
    font-weight:600;
}

/* MAIN */

.main{
    margin-left:250px;
    padding:35px;
    width:100%;
}

.title{
    font-size:34px;
    font-weight:bold;
    color:#334155;
    margin-bottom:30px;
}

/* GRID */

.settings-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:25px;
}

/* CARD */

.card{
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.card h3{
    color:#334155;
    margin-bottom:20px;
    font-size:22px;
}

.setting-item{
    margin-bottom:20px;
}

.setting-item label{
    display:block;
    margin-bottom:10px;
    font-weight:600;
    color:#334155;
}

.setting-item select,
.setting-item input{
    width:100%;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:10px;
    font-size:14px;
}

.button{
    background:#475569;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
}

.button:hover{
    background:#334155;
}

.info-text{
    margin-top:8px;
    color:#64748b;
    font-size:13px;
}

/* DARK MODE */

.dark-mode{
    background:#0f172a;
    color:white;
}

.dark-mode .card{
    background:#1e293b;
    color:white;
}

.dark-mode .setting-item label{
    color:#e2e8f0;
}

.dark-mode input,
.dark-mode select{
    background:#0f172a;
    color:white;
    border:1px solid #334155;
}

.dark-mode .sidebar{
    background:#1e293b;
    color:white;
}

.dark-mode .sidebar ul li{
    color:white;
}

.dark-mode .active{
    background:#334155;
}

.dark-mode .title,
.dark-mode .card h3{
    color:white;
}

/* MOBILE */

@media(max-width:900px){

    .sidebar{
        position:relative;
        width:100%;
        height:auto;
    }

    .main{
        margin-left:0;
    }

    .container{
        flex-direction:column;
    }
}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">

<div class="logo">
EndoPredict AI
</div>

<ul>

<li onclick="window.location.href='/dashboard'">
🏠 Dashboard
</li>

<li onclick="window.location.href='/'">
🩺 Prediction
</li>

<li onclick="window.location.href='/analytics'">
📊 Analytics
</li>

<li onclick="window.location.href='/reports'">
📁 Reports
</li>

<li class="active">
⚙ Settings
</li>

</ul>

</div>

<div class="main">

<div class="title" data-i18n="settings">
⚙ Settings
</div>

<div class="settings-grid">

<div class="card">

<h3 data-i18n="appearance">Appearance</h3>

<div class="setting-item">

<label data-i18n="dark_mode">Dark Mode</label>

<button class="button" onclick="toggleDarkMode()">
Toggle Dark Mode
</button>

<p class="info-text">
Enable or disable dark mode interface
</p>

</div>

</div>

<div class="card">

<h3>Language</h3>

<div class="setting-item">

<label>Select Language</label>

<select id="langSelect" onchange="changeLanguage(this.value)">

<option value="en">English</option>
<option value="te">Telugu</option>
<option value="hi">Hindi</option>

</select>

<p class="info-text">
Select your preferred language
</p>

</div>

</div>

<div class="card">

<h3 data-i18n="system_info">
System Information
</h3>

<div class="setting-item">

<label>App Version</label>

<input type="text" value="1.0.0" readonly>

</div>

<div class="setting-item">

<label>Last Updated</label>

<input type="text" value="2026-06-20" readonly>

</div>

</div>

<div class="card">

<h3 data-i18n="prediction_settings">
Prediction Settings
</h3>

<div class="setting-item">

<button class="button"
        onclick="clearHistory()"
        data-i18n="reset_prediction_history">
Reset Prediction History
</button>

<p class="info-text">
Delete all saved prediction records
</p>

</div>

</div>

</div>

</div>

</div>

<script>

function toggleDarkMode(){

    document.body.classList.toggle("dark-mode");

    localStorage.setItem(
        "darkMode",
        document.body.classList.contains("dark-mode")
    );
}

window.addEventListener("DOMContentLoaded",()=>{

    if(localStorage.getItem("darkMode")==="true"){
        document.body.classList.add("dark-mode");
    }

    const savedLanguage =
        localStorage.getItem("preferredLanguage") || "en";

    document.getElementById("langSelect").value =
        savedLanguage;

});

function clearHistory(){

    localStorage.removeItem("predictionData");

    alert("Prediction history cleared successfully");
}

</script>

<script src="/static/global.js"></script>

</body>
</html>
